# ─────────────────────────────────────────────────────────────────────────────
# sonar-project.properties — Configuración del análisis de calidad con SonarQube
# ─────────────────────────────────────────────────────────────────────────────

# Clave única del proyecto (sin espacios). Cambia "TU_USUARIO" por tu usuario de GitHub.
sonar.projectKey=TU_USUARIO_crud-py

# Nombre que aparecerá en el dashboard de SonarCloud
sonar.projectName=CRUD Python - Registro de Productos

# Versión del proyecto
sonar.projectVersion=1.0

# Carpeta raíz del código fuente (. = carpeta actual)
sonar.sources=.

# Archivos de pruebas unitarias
sonar.tests=test_productos.py

# Excluir archivos que no son parte del código del negocio
sonar.exclusions=generar_documento.py,**/__pycache__/**,*.json,*.docx,*.pdf

# Lenguaje
sonar.language=py

# Codificación de los archivos
sonar.sourceEncoding=UTF-8
